name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    container: ghcr.io/ae86jaywei/android-build-docker:latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/cache@v3
      with:
        path: /root/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # 复制 SDK 到用户可写目录
    - name: Setup writable Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cp -r /opt/android-sdk/* $HOME/android-sdk/
        # 设置环境变量供后续步骤使用
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        # 可选：将 cmdline-tools 加入 PATH
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    - name: Build
      run: |
        echo "Work dir: $(pwd)"
        echo "User: $(whoami)"
        
        # Switch Java version to 17 (default in docker image)
        source ~/.bash_profile 2>/dev/null || true
        jenv global 17 2>/dev/null || true
        java -version
        
        # Build APK
        cd FinanceAttendanceAndroid
        chmod +x gradlew
        ./gradlew clean assembleRelease

    - name: Archive apk
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: FinanceAttendanceAndroid/app/build/outputs/apk/release
    
    - name: Clean build to avoid action/cache error
      run: rm -fr FinanceAttendanceAndroid/build
