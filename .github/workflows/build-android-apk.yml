name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    container: mingc/android-build-box:latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/cache@v3
      with:
        path: /root/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build
      run: |
        echo "Work dir: $(pwd)"
        echo "User: $(whoami)"
        
        # Switch Java version to 11
        source ~/.bash_profile 2>/dev/null || true
        jenv global 11 2>/dev/null || true
        java -version
        
        # Build APK
        cd FinanceAttendanceAndroid
        chmod +x gradlew
        ./gradlew clean assembleRelease

    - name: Archive apk
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: FinanceAttendanceAndroid/app/build/outputs/apk/release
    
    - name: Clean build to avoid action/cache error
      run: rm -fr FinanceAttendanceAndroid/build
