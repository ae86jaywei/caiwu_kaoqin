name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    container: ghcr.io/ae86jaywei/android-build-docker:latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/cache@v3
      with:
        path: /root/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Fix SDK directory permissions
      run: |
        sudo chown -R $(whoami):$(whoami) /opt/android-sdk || true
        # 确保 cmdline-tools 也可执行
        sudo chmod -R u+w /opt/android-sdk

    - name: Build
      run: |
        echo "Work dir: $(pwd)"
        echo "User: $(whoami)"
        
        # Switch Java version to 17 (default in docker image)
        source ~/.bash_profile 2>/dev/null || true
        jenv global 17 2>/dev/null || true
        java -version
        
        # Build APK
        cd FinanceAttendanceAndroid
        chmod +x gradlew
        ./gradlew clean assembleRelease

    - name: Archive apk
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: FinanceAttendanceAndroid/app/build/outputs/apk/release
    
    - name: Clean build to avoid action/cache error
      run: rm -fr FinanceAttendanceAndroid/build
