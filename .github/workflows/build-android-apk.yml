name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ae86jaywei/android-build-docker:latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # 复制 SDK 到用户可写目录
    - name: Setup writable Android SDK
      run: |
        mkdir -p $HOME/android-sdk
        cp -r /opt/android-sdk/* $HOME/android-sdk/
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
    
    # 升级项目配置以支持 compileSdk 34
    - name: Upgrade project to compileSdk 34 and AGP 8.1.4
      run: |
        # 升级项目级 build.gradle 中的 AGP 版本
        PROJECT_GRADLE="FinanceAttendanceAndroid/build.gradle"
        if grep -q "classpath \"com.android.tools.build:gradle:8.0.2\"" "$PROJECT_GRADLE"; then
          sed -i 's/classpath "com.android.tools.build:gradle:8.0.2"/classpath "com.android.tools.build:gradle:8.1.4"/' "$PROJECT_GRADLE"
          echo "Upgraded AGP to 8.1.4"
        fi
        
        # 修改 app/build.gradle 中的 compileSdk 和 targetSdk
        APP_GRADLE="FinanceAttendanceAndroid/app/build.gradle"
        sed -i 's/compileSdk 33/compileSdk 34/' "$APP_GRADLE"
        sed -i 's/targetSdk 33/targetSdk 34/' "$APP_GRADLE"
        echo "Updated compileSdk and targetSdk to 34"
        
        # 确保 buildToolsVersion 存在
        if ! grep -q "buildToolsVersion" "$APP_GRADLE"; then
          sed -i '/compileSdk 34/a\    buildToolsVersion "34.0.0"' "$APP_GRADLE"
        fi
        
        # 设置 Compose 编译器版本（兼容 Kotlin 1.9.22）
        if grep -q "composeOptions {" "$APP_GRADLE"; then
          sed -i 's/kotlinCompilerExtensionVersion = .*/kotlinCompilerExtensionVersion = "1.5.10"/' "$APP_GRADLE"
        else
          sed -i '/android {/a\
        composeOptions {\
            kotlinCompilerExtensionVersion = "1.5.10"\
        }' "$APP_GRADLE"
        fi
    
    # 添加 Compose 依赖（如果缺失）
    - name: Add Compose dependencies
      run: |
        APP_GRADLE="FinanceAttendanceAndroid/app/build.gradle"
        if ! grep -q "compose-bom" "$APP_GRADLE"; then
          sed -i '/dependencies {/a\
          // Compose BOM and libraries\
          implementation platform("androidx.compose:compose-bom:2024.08.00")\
          implementation "androidx.compose.ui:ui"\
          implementation "androidx.compose.material3:material3"\
          implementation "androidx.compose.ui:ui-tooling-preview"\
          debugImplementation "androidx.compose.ui:ui-tooling"' "$APP_GRADLE"
        fi
    
    # 修复 Theme.kt 缺失的导入
    - name: Fix imports in Theme.kt
      run: |
        THEME_FILE="FinanceAttendanceAndroid/app/src/main/java/com/financeattendance/ui/theme/Theme.kt"
        if [ -f "$THEME_FILE" ] && ! grep -q "import androidx.compose.runtime.Composable" "$THEME_FILE"; then
          sed -i '/^package /a\\
          import androidx.compose.runtime.Composable' "$THEME_FILE"
        fi

    - name: Build
      run: |
        echo "Work dir: $(pwd)"
        echo "User: $(whoami)"
        
        source ~/.bash_profile 2>/dev/null || true
        jenv global 17 2>/dev/null || true
        java -version
        
        cd FinanceAttendanceAndroid
        chmod +x gradlew
        ./gradlew clean assembleRelease

    - name: Create Release and Upload APK
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: release-${{ github.sha }}
        name: Release ${{ github.sha }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          FinanceAttendanceAndroid/app/build/outputs/apk/release/*.apk
    
    - name: Clean build
      run: rm -fr FinanceAttendanceAndroid/build
